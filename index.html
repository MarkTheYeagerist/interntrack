<!DOCTYPE html>
<html>
<head>
  <title>InternTrack Login</title>
  <link rel="stylesheet" href="css/style.css">
  <meta name="viewport" content="width=device-width, initial-scale=1" />
</head>
<body>

  <div class="auth">
    <div class="auth-left">
      <div class="auth-brand">
        <h1>Platinum Internship Portal</h1>
        <p class="auth-subtitle">Manage Daily Time Record via this portal.</p>
      </div>

      <div class="auth-footer">© 2026 Lunaire Studio</div>
    </div>

    <div class="auth-right">
      <div class="auth-card">
        <div class="auth-head">
          <h2>Login InternTrack Account</h2>
          <p class="muted">Enter your Company Account and Password</p>
        </div>

        <div class="auth-note">
          Use your <b>Company Account</b> and <b>Password</b> to continue.
        </div>

        <div class="auth-form">
          <label class="auth-label">Company Account</label>
          <input type="email" id="email" placeholder="pluk.yourname@gmail.com" required>

          <label class="auth-label" style="margin-top:10px;">Password</label>
          <input type="password" id="password" placeholder="Password" required>

          <div class="show-password-row auth-showpass">
            <input type="checkbox" id="showPass" onclick="togglePassword()">
            <label for="showPass">Show password</label>
          </div>

          <div class="auth-links">
            <a href="#" onclick="forgotPassword(); return false;">Forgot Password?</a>
            <span class="auth-sep">•</span>
            <a href="#" onclick="resendVerification(); return false;">Resend Verification</a>
          </div>

          <div class="auth-actions">
            <button onclick="loginIntern()">Login as Intern</button>
            <button class="btn-danger" onclick="loginAdmin()">Login as Admin</button>
          </div>

          <div class="auth-bottom">
            <span class="muted">Don't have account?</span>
            <a href="register.html">Register</a>
          </div>

          <p id="status" class="muted" style="margin-top:10px;"></p>
        </div>
      </div>
    </div>
  </div>

  <script type="module">
    import { auth, db } from "./js/firebase.js";
    import {
      signInWithEmailAndPassword,
      signOut,
      sendPasswordResetEmail,
      sendEmailVerification
    } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { doc, getDoc }
      from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const statusEl = document.getElementById("status");

    window.loginIntern = async function () {
      await loginUser("intern");
    };

    window.loginAdmin = async function () {
      await loginUser("admin");
    };

    function getEmailInput() {
      return document.getElementById("email").value.trim().toLowerCase();
    }

    function getPasswordInput() {
      return document.getElementById("password").value;
    }

    window.togglePassword = function () {
      const pass = document.getElementById("password");
      const cb = document.getElementById("showPass");
      pass.type = cb.checked ? "text" : "password";
    };

    function enforcePluk(email) {
      if (!email.startsWith("pluk.")) {
        alert("Company account must start with 'pluk.'\nExample: pluk.marklawrencebautista@gmail.com");
        return false;
      }
      return true;
    }

    async function loginUser(expectedRole) {
      const email = getEmailInput();
      const password = getPasswordInput();

      statusEl.textContent = "";

      if (!email || !password) {
        alert("Please fill all fields.");
        return;
      }

      if (!enforcePluk(email)) return;

      try {
        statusEl.textContent = "Signing in...";
        const userCredential = await signInWithEmailAndPassword(auth, email, password);
        const user = userCredential.user;

        if (!user.emailVerified) {
          alert("Please verify your email before logging in.\nYou can click 'Resend Verification'.");
          await signOut(auth);
          statusEl.textContent = "Email not verified.";
          return;
        }

        const snap = await getDoc(doc(db, "users", user.uid));
        const role = snap.exists() ? snap.data().role : null;

        if (expectedRole === "admin") {
          if (role !== "admin") {
            alert("Access denied. Not an admin account.");
            await signOut(auth);
            statusEl.textContent = "Access denied.";
            return;
          }
          window.location.href = "admin.html";
        } else {
          window.location.href = "dashboard.html";
        }

      } catch (error) {
        alert(error.message);
        statusEl.textContent = "Login failed.";
      }
    }

    window.forgotPassword = async function () {
      const email = getEmailInput();
      statusEl.textContent = "";

      if (!email) {
        alert("Please enter your Company Account email first.");
        return;
      }

      if (!enforcePluk(email)) return;

      try {
        await sendPasswordResetEmail(auth, email);
        alert("Password reset email sent!\nCheck your inbox/spam for the reset link.");
        statusEl.textContent = "Reset email sent.";
      } catch (error) {
        alert(error.message);
        statusEl.textContent = "Reset failed.";
      }
    };

    window.resendVerification = async function () {
      const email = getEmailInput();
      const password = getPasswordInput();
      statusEl.textContent = "";

      if (!email || !password) {
        alert("Enter your Company Account and Password first, then click Resend Verification.");
        return;
      }

      if (!enforcePluk(email)) return;

      try {
        const userCredential = await signInWithEmailAndPassword(auth, email, password);
        const user = userCredential.user;

        if (user.emailVerified) {
          alert("Your email is already verified. You can log in now.");
          await signOut(auth);
          statusEl.textContent = "Already verified.";
          return;
        }

        await sendEmailVerification(user);
        alert("Verification email sent!\nPlease check your inbox/spam, then log in again.");
        statusEl.textContent = "Verification sent.";

        await signOut(auth);
      } catch (error) {
        alert(error.message);
        statusEl.textContent = "Resend failed.";
      }
    };
  </script>

</body>
</html>
