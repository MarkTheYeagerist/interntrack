<!DOCTYPE html>
<html>
<head>
  <title>InternTrack Login</title>
  <link rel="stylesheet" href="css/style.css">
  <meta name="viewport" content="width=device-width, initial-scale=1" />
</head>
<body>

  <div class="auth">
    <div class="auth-left">
      <div class="auth-brand">
        <h1>Platinum Internship Portal</h1>
        <p class="auth-subtitle">Manage Daily Time Record via this portal.</p>
      </div>

      <div class="auth-footer">© 2026 Lunaire Studio</div>
    </div>

    <div class="auth-right">
      <div class="auth-card">
        <div class="auth-head">
          <h2>Login InternTrack Account</h2>
          <p class="muted">Enter your Username and Password</p>
        </div>

        <div class="auth-note">
          Use your <b>Username</b> and <b>Password</b> to continue.
        </div>

        <div class="auth-form">
          <label class="auth-label">Username</label>
          <input type="text" id="email" placeholder="pluk.yourname@gmail.com or Admin" required>

          <label class="auth-label" style="margin-top:10px;">Password</label>
          <input type="password" id="password" placeholder="Password" required>

          <div class="show-password-row auth-showpass">
            <input type="checkbox" id="showPass" onclick="togglePassword()">
            <label for="showPass">Show password</label>
          </div>

          <div class="auth-links">
            <a href="#" onclick="forgotPassword(); return false;">Forgot Password?</a>
            <span class="auth-sep">•</span>
            <a href="#" onclick="resendVerification(); return false;">Resend Verification</a>
          </div>

          <div class="auth-actions">
            <button onclick="loginUser()">Login</button>
          </div>

          <div class="auth-bottom">
            <span class="muted">Don't have account?</span>
            <a href="register.html">Register</a>
          </div>

          <p id="status" class="muted" style="margin-top:10px;"></p>
        </div>
      </div>
    </div>
  </div>

  <script type="module">
    import { auth, db } from "./js/firebase.js";
    import {
      signInWithEmailAndPassword,
      signOut,
      sendPasswordResetEmail,
      sendEmailVerification
    } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { doc, getDoc }
      from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const statusEl = document.getElementById("status");

    const ADMIN_USERNAME = "admin";
    const ADMIN_EMAIL = "admin@interntrack.com";

    function getUsernameInput() {
      return document.getElementById("email").value.trim();
    }

    function getPasswordInput() {
      return document.getElementById("password").value;
    }

    function isAdminUsername(username) {
      return username.toLowerCase() === ADMIN_USERNAME;
    }

    function isInternUsername(username) {
      return username.toLowerCase().includes("pluk");
    }

    function convertUsernameToEmail(username) {
      if (isAdminUsername(username)) return ADMIN_EMAIL;
      return username.trim().toLowerCase();
    }

    window.togglePassword = function () {
      const pass = document.getElementById("password");
      const cb = document.getElementById("showPass");
      pass.type = cb.checked ? "text" : "password";
    };

    function validateLoginInput(username) {
      if (isAdminUsername(username)) return true;

      if (!isInternUsername(username)) {
        alert("Intern username must contain 'pluk'.\nExample: pluk.marklawrencebautista@gmail.com\n\nFor admin, use Username: Admin");
        return false;
      }

      return true;
    }

    window.loginUser = async function () {
      const username = getUsernameInput();
      const password = getPasswordInput();

      statusEl.textContent = "";

      if (!username || !password) {
        alert("Please fill all fields.");
        return;
      }

      if (!validateLoginInput(username)) return;

      const emailToLogin = convertUsernameToEmail(username);

      try {
        statusEl.textContent = "Signing in...";
        const userCredential = await signInWithEmailAndPassword(auth, emailToLogin, password);
        const user = userCredential.user;

        const snap = await getDoc(doc(db, "users", user.uid));
        const role = snap.exists() ? snap.data().role : null;

        if (isAdminUsername(username)) {
          if (role !== "admin") {
            alert("Access denied. This account is not registered as admin.");
            await signOut(auth);
            statusEl.textContent = "Access denied.";
            return;
          }

          window.location.href = "admin.html";
          return;
        }

        if (!user.emailVerified) {
          alert("Please verify your email before logging in.\nYou can click 'Resend Verification'.");
          await signOut(auth);
          statusEl.textContent = "Email not verified.";
          return;
        }

        window.location.href = "dashboard.html";

      } catch (error) {
        alert(error.message);
        statusEl.textContent = "Login failed.";
      }
    };

    window.forgotPassword = async function () {
      const username = getUsernameInput();
      statusEl.textContent = "";

      if (!username) {
        alert("Please enter your username first.");
        return;
      }

      if (isAdminUsername(username)) {
        alert("Password reset is not available using the Admin username field.\nUse the real admin email in Firebase if needed.");
        return;
      }

      if (!validateLoginInput(username)) return;

      const email = convertUsernameToEmail(username);

      try {
        await sendPasswordResetEmail(auth, email);
        alert("Password reset email sent.\nCheck your inbox or spam for the reset link.");
        statusEl.textContent = "Reset email sent.";
      } catch (error) {
        alert(error.message);
        statusEl.textContent = "Reset failed.";
      }
    };

    window.resendVerification = async function () {
      const username = getUsernameInput();
      const password = getPasswordInput();
      statusEl.textContent = "";

      if (!username || !password) {
        alert("Enter your username and password first, then click Resend Verification.");
        return;
      }

      if (isAdminUsername(username)) {
        alert("Admin account does not need email verification from this login form.");
        return;
      }

      if (!validateLoginInput(username)) return;

      const email = convertUsernameToEmail(username);

      try {
        const userCredential = await signInWithEmailAndPassword(auth, email, password);
        const user = userCredential.user;

        if (user.emailVerified) {
          alert("Your email is already verified. You can log in now.");
          await signOut(auth);
          statusEl.textContent = "Already verified.";
          return;
        }

        await sendEmailVerification(user);
        alert("Verification email sent.\nPlease check your inbox or spam, then log in again.");
        statusEl.textContent = "Verification sent.";

        await signOut(auth);
      } catch (error) {
        alert(error.message);
        statusEl.textContent = "Resend failed.";
      }
    };
  </script>

</body>
</html>
